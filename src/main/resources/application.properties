# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/sustainedu_db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server Port
server.port=8080

# JWT Secret (Base64 encoded string, should be at least 256 bits)
# Using a secure random base64 string for Sustainedu
jwt.secret=sustainedu_super_secret_key_that_is_at_least_32_bytes_long_so_it_works_with_hs256
jwt.expiration=86400000
